name: Flutter CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build_check:
    name: Build Check (Android)
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart_defines.json
        run: |
          echo '{
            "FIREBASE_ANDROID_API_KEY": "${{ secrets.FIREBASE_ANDROID_API_KEY }}",
            "FIREBASE_ANDROID_APP_ID": "${{ secrets.FIREBASE_ANDROID_APP_ID }}",
            "FIREBASE_IOS_API_KEY": "${{ secrets.FIREBASE_IOS_API_KEY }}",
            "FIREBASE_IOS_APP_ID": "${{ secrets.FIREBASE_IOS_APP_ID }}",
            "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "FIREBASE_IOS_BUNDLE_ID": "${{ secrets.FIREBASE_IOS_BUNDLE_ID }}"
          }' > dart_defines.json

      - name: Build APK (debug)
        run: flutter build apk --debug --no-pub --dart-define-from-file=dart_defines.json
